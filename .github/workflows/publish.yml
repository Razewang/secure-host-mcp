name: publish

on:
  workflow_call:
    inputs:
      version:
        description: "Exact package version to build (without v)"
        required: false
        default: ""
        type: string
      publish:
        description: "Publish GitHub Release assets and npm package"
        required: true
        type: boolean
      prerelease:
        description: "Mark the publication as a prerelease"
        required: false
        default: false
        type: boolean
      ref:
        description: "Git ref or SHA containing the exact release source"
        required: false
        default: ""
        type: string

concurrency:
  group: publish-${{ inputs.version || inputs.ref || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: read
    uses: ./.github/workflows/build-release.yml
    with:
      version: ${{ inputs.version }}
      publish: ${{ inputs.publish }}
      prerelease: ${{ inputs.prerelease }}
      ref: ${{ inputs.ref }}

  publish-release:
    if: needs.build.outputs.publish == 'true'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.sha }}
      - uses: actions/download-artifact@v8
        with:
          name: release-${{ needs.build.outputs.version }}
          path: assets
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.build.outputs.tag }}
          PRERELEASE: ${{ needs.build.outputs.prerelease }}
          VERIFY_TAG: ${{ needs.build.outputs.verify_tag }}
          SOURCE_SHA: ${{ needs.build.outputs.source_sha }}
        shell: bash
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            tag_sha="$(git rev-list -n 1 "$TAG")"
            if [ "$tag_sha" != "$SOURCE_SHA" ]; then echo "Existing $TAG does not identify $SOURCE_SHA." >&2; exit 1; fi
            gh release upload "$TAG" assets/* --repo "$GITHUB_REPOSITORY" --clobber
            echo "Uploaded release assets to existing $TAG."
            exit 0
          fi
          args=(release create "$TAG" assets/* --repo "$GITHUB_REPOSITORY" --target "$SOURCE_SHA" --generate-notes --title "$TAG")
          if [ "$VERIFY_TAG" = "true" ]; then args+=(--verify-tag); fi
          if [ "$PRERELEASE" = "true" ]; then args+=(--prerelease); fi
          gh "${args[@]}"

  publish-npm:
    if: needs.build.outputs.publish == 'true'
    needs: [build, publish-release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm install --global npm@latest
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Refuse an existing npm version
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          if npm view "secure-host-mcp@$VERSION" version >/dev/null 2>&1; then
            echo "secure-host-mcp@$VERSION already exists; refusing to republish." >&2
            exit 1
          fi
      - name: Publish npm package with trusted publishing
        run: npm publish --access public --tag "${{ needs.build.outputs.npm_tag }}"
