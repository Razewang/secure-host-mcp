name: build release

on:
  workflow_call:
    inputs:
      version:
        description: "Exact package version to build (without v)"
        required: false
        default: ""
        type: string
      publish:
        description: "Whether release metadata is being prepared for publication"
        required: true
        type: boolean
      prerelease:
        description: "Mark the publication as a prerelease"
        required: false
        default: false
        type: boolean
      ref:
        description: "Git ref or SHA containing the exact release source"
        required: false
        default: ""
        type: string
    outputs:
      version:
        value: ${{ jobs.preflight.outputs.version }}
      tag:
        value: ${{ jobs.preflight.outputs.tag }}
      publish:
        value: ${{ jobs.preflight.outputs.publish }}
      prerelease:
        value: ${{ jobs.preflight.outputs.prerelease }}
      npm_tag:
        value: ${{ jobs.preflight.outputs.npm_tag }}
      verify_tag:
        value: ${{ jobs.preflight.outputs.verify_tag }}
      source_sha:
        value: ${{ jobs.preflight.outputs.source_sha }}

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      tag: ${{ steps.metadata.outputs.tag }}
      publish: ${{ steps.metadata.outputs.publish }}
      prerelease: ${{ steps.metadata.outputs.prerelease }}
      npm_tag: ${{ steps.metadata.outputs.npm_tag }}
      verify_tag: ${{ steps.metadata.outputs.verify_tag }}
      source_sha: ${{ steps.metadata.outputs.source_sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.sha }}
      - name: Validate release metadata
        id: metadata
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          REQUESTED_VERSION: ${{ inputs.version }}
          REQUESTED_PUBLISH: ${{ inputs.publish }}
          REQUESTED_PRERELEASE: ${{ inputs.prerelease }}
        shell: bash
        run: |
          node <<'NODE'
          const { appendFileSync, readFileSync } = require("node:fs");
          const { execFileSync } = require("node:child_process");
          const pkg = JSON.parse(readFileSync("package.json", "utf8"));
          const semver = /^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?(?:\+[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?$/;
          const sourceSha = execFileSync("git", ["rev-parse", "HEAD"], { encoding: "utf8" }).trim();
          const tagRun = process.env.REF_TYPE === "tag";
          const requestedRun = Boolean(process.env.REQUESTED_VERSION);
          const version = tagRun ? process.env.REF_NAME.slice(1) : requestedRun ? process.env.REQUESTED_VERSION : pkg.version;
          if (!semver.test(version)) throw new Error(`Invalid semantic version: ${version}`);
          if (version !== pkg.version) throw new Error(`Release ${version} does not match package.json ${pkg.version}`);
          const tag = `v${version}`;
          if (tagRun && process.env.REF_NAME !== tag) throw new Error(`Tag must be exactly ${tag}`);
          const publish = process.env.REQUESTED_PUBLISH === "true";
          const prerelease = publish ? process.env.REQUESTED_PRERELEASE === "true" : version.includes("-");
          if (publish && !prerelease) {
            let tagSha;
            try { tagSha = execFileSync("git", ["rev-list", "-n", "1", tag], { encoding: "utf8" }).trim(); }
            catch { throw new Error(`Stable publication requires existing tag ${tag}`); }
            if (tagSha !== sourceSha) throw new Error(`${tag} does not identify release source ${sourceSha}`);
          }
          const output = process.env.GITHUB_OUTPUT;
          for (const [key, value] of Object.entries({ version, tag, publish: String(publish), prerelease: String(prerelease), npm_tag: prerelease ? "next" : "latest", verify_tag: String(publish && !prerelease), source_sha: sourceSha })) {
            appendFileSync(output, `${key}=${value}\n`);
          }
          NODE

  build:
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-x64
          - os: ubuntu-latest
            platform: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - uses: actions/setup-dotnet@v5
        if: runner.os == 'Windows'
        with:
          dotnet-version: 8.0.x
      - name: Build native Windows launcher
        if: runner.os == 'Windows'
        run: dotnet publish packaging/windows-launcher/SecureHostMcpLauncher.csproj -c Release -r win-x64 --self-contained true
      - name: Build standalone package
        shell: bash
        env:
          SECURE_HOST_MCP_WINDOWS_LAUNCHER: ${{ runner.os == 'Windows' && format('{0}/packaging/windows-launcher/bin/Release/net8.0/win-x64/publish/secure-host-mcp.exe', github.workspace) || '' }}
        run: npm run package:standalone
      - name: Smoke-test Windows launchers
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $package = "release/secure-host-mcp-win32-x64"
          & "$package/secure-host-mcp.exe" --version
          if ($LASTEXITCODE -ne 0) { throw "Native launcher smoke test failed" }
          & "$package/secure-host-mcp.cmd" --version
          if ($LASTEXITCODE -ne 0) { throw "CMD launcher smoke test failed" }
      - name: Smoke-test Linux launcher
        if: runner.os == 'Linux'
        run: ./release/secure-host-mcp-linux-x64/secure-host-mcp --version
      - name: Create Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path assets | Out-Null
          Compress-Archive -Path "release/secure-host-mcp-win32-x64/*" -DestinationPath "assets/secure-host-mcp-${{ needs.preflight.outputs.version }}-windows-x64.zip"
      - name: Create Linux archive
        if: runner.os == 'Linux'
        run: |
          mkdir -p assets
          tar -C release/secure-host-mcp-linux-x64 -czf "assets/secure-host-mcp-${{ needs.preflight.outputs.version }}-linux-x64.tar.gz" .
      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.platform }}
          path: assets/*
          if-no-files-found: error

  assets:
    needs: [preflight, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: assets
          merge-multiple: true
      - name: Create checksums and verify allowlist
        shell: bash
        run: |
          cd assets
          expected="secure-host-mcp-${{ needs.preflight.outputs.version }}-linux-x64.tar.gz secure-host-mcp-${{ needs.preflight.outputs.version }}-windows-x64.zip"
          actual="$(find . -maxdepth 1 -type f -printf '%f\n' | sort | tr '\n' ' ' | sed 's/ $//')"
          if [ "$actual" != "$expected" ]; then echo "Unexpected assets: $actual" >&2; exit 1; fi
          sha256sum $expected > SHA256SUMS.txt
      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ needs.preflight.outputs.version }}
          path: assets/*
          if-no-files-found: error
