name: release

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Exact package version to build (without v)"
        required: true
        type: string
      publish:
        description: "Publish GitHub Release assets and npm package"
        required: true
        default: false
        type: boolean
      prerelease:
        description: "Mark a manual publication as a prerelease"
        required: true
        default: true
        type: boolean
      ref:
        description: "Release tag/ref to build; required for recovering an existing release"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  release-please:
    if: github.event_name == 'push' && github.ref_type == 'branch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-tag:
    if: github.event_name == 'push' && github.ref_type == 'tag'
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/publish.yml
    with:
      version: ""
      publish: true
      prerelease: ${{ contains(github.ref_name, '-') }}
      ref: ${{ github.ref }}

  publish-release-please:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/publish.yml
    with:
      version: ${{ needs.release-please.outputs.version }}
      publish: true
      prerelease: false
      ref: v${{ needs.release-please.outputs.version }}

  manual:
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/publish.yml
    with:
      version: ${{ inputs.version }}
      publish: ${{ inputs.publish }}
      prerelease: ${{ inputs.prerelease }}
      ref: ${{ inputs.ref || github.sha }}
