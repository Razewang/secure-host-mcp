name: ci
on:
  push:
  pull_request:
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm pack --dry-run
      - run: npm run package:standalone
      - name: Smoke-test standalone bundle
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then ./release/secure-host-mcp-win32-x64/secure-host-mcp.cmd --version; else ./release/secure-host-mcp-linux-x64/secure-host-mcp --version; fi
